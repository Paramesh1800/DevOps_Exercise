auth_enabled: false

server:
  http_listen_port: 3100

common:
  path_prefix: /tmp/loki

storage_config:
  filesystem:
    directory: /tmp/loki/chunks

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  allow_structured_metadata: false

ruler:
  storage:
    type: local
    local:
      directory: /tmp/loki/rules